# ================================================================
# 地图配置文件
# 用于 Nav2 导航加载的 OccupancyGrid 地图
# ================================================================

# 地图图像文件名 (相对于此 yaml 文件的路径，或绝对路径)
image: map.pgm

# 地图分辨率 (米/像素)
# 需要与 Cartographer 建图时使用的分辨率一致
resolution: 0.05

# 地图原点 (地图左下角在世界坐标系中的位置 [x, y, theta])
# theta 表示地图的旋转角度
origin: [0.0, 0.0, 0.0]

# 占据阈值: 大于此值的像素被认为是障碍物
occupied_thresh: 0.65

# 空闲阈值: 小于此值的像素被认为是可通行区域
free_thresh: 0.196

# 是否对图像进行反色处理
# false: 黑色=障碍物, 白色=空闲
# true:  黑色=空闲, 白色=障碍物
negate: 0

# 机器人在未知区域的行为模式
# true: 将未知区域视为空闲
# false: 将未知区域视为障碍物 (更安全)
unknown_space_value: true
